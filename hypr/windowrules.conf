# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Pavucontrol floating
windowrule {
    name = pavu-rule
    size = 700 600
    float = on
    center = on
    match:class = org.pulseaudio.pavucontrol
}

# waypaper floating
windowrule {
    name = waypaper-rule
    size = 900 900
    float = on
    center = on
    match:class = waypaper
}

# nwg-look
windowrule {
    name = nwg-rule
    size = 800 600
    float = on
    center = on
    match:class = nwg-look
}

# peridot floating 
windowrule {
    name = peridot-float
    size = 900 900
    float = on
    center = on
    match:class = peridot-floating
}

windowrule {
    name = nm-connections-rule
    size = 400 600
    float = on
    center = on
    match:class = nm-connection-editor
}

layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0, match:namespace quickshell

layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0, match:namespace logout_dialog


